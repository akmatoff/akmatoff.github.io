{{ define "main" }}
<h1 class="page-heading">{{ .Title }}</h1>
<div>
    {{ .Content }}
</div>
<div class="list">
    {{ range .Pages }}
    <div class="list-element">
        <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
        <span class="subtitle">{{ .Date.Format "January 2, 2006" }}</span>
        <p>
            {{ .Summary }}
        </p>
    </div>
    {{ end }}
</div>
{{ end }}
